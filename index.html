<head>
    <meta charset="utf-8">
    <title>日曆&時間</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font Link for Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="wrapper">
        <div class="page2">
            <a href="https://isurunanase.github.io/layout-1/" class="logo">
              <img src="image/fins.png" alt="公司名稱">
            </a>
            <div class="box">
                  <h1 class="title"><b>選取您要預約的時段</b></h1>
                  <br>
      <header>
        <p class="current-date"></p>
        <div class="icons">
          <span id="prev" class="material-symbols-rounded">chevron_left</span>
          <span id="next" class="material-symbols-rounded">chevron_right</span>
        </div>
      </header>
      <div class="calendar">
        <ul class="weeks">
          <li>Sun</li>
          <li>Mon</li>
          <li>Tue</li>
          <li>Wed</li>
          <li>Thu</li>
          <li>Fri</li>
          <li>Sat</li>
        </ul>
        <ul class="days"></ul>
        <br>
              <div class="btn">
                <a href="#" class="btn1">09:00 - 12:00 平潛練習</a>
                <br><a href="#" class="btn1">13:00 - 16:00 平壓練習</a>
                <br><a href="#" class="btn2">18:00 - 21:00 深度訓練</a>                
              </div>
              <br>
              <div class="next">
               <a href="https://isurunanase.github.io/page-three/">下一步 ❯</a>
              </div>  
            </div>
        </div>
      </div>
    </div>
    
  </body>
